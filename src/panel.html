<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sigorta Bot - Temsilci Paneli</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; margin: 0; height: 100vh; background: #f0f2f5; display: flex; flex-direction: column; }
  #topTabs { display: flex; background: #075E54; }
  #topTabs button { flex: none; padding: 14px 24px; border: none; background: transparent; color: #cde; font-size: 14px; font-weight: 600; cursor: pointer; }
  #topTabs button.active { background: #0b7a6b; color: #fff; }
  #appBody { flex: 1; display: flex; overflow: hidden; }
  #sidebar { width: 320px; border-right: 1px solid #ddd; overflow-y: auto; background: #fff; }
  #sidebar h2 { font-size: 16px; padding: 16px; margin: 0; border-bottom: 1px solid #eee; }
  .convo { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
  .convo:hover { background: #f5f5f5; }
  .convo.active { background: #e7f3ff; }
  .convo .name { font-weight: 600; font-size: 14px; }
  .convo .phone { font-size: 12px; color: #888; }
  .convo .preview { font-size: 13px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  #main { flex: 1; display: flex; flex-direction: column; }
  #chatHeader { padding: 16px; border-bottom: 1px solid #ddd; background: #fff; display: flex; justify-content: space-between; align-items: center; }
  #chatHeader h3 { margin: 0; font-size: 15px; }
  #pauseBtn { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
  #pauseBtn.paused { background: #ffc107; }
  #pauseBtn.active { background: #e0e0e0; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 60%; padding: 8px 12px; border-radius: 10px; font-size: 14px; line-height: 1.4; }
  .msg.in { align-self: flex-start; background: #fff; border: 1px solid #eee; }
  .msg.out { align-self: flex-end; background: #d9fdd3; }
  .msg .time { font-size: 10px; color: #999; margin-top: 4px; }
  #composer { display: flex; padding: 12px; border-top: 1px solid #ddd; background: #fff; gap: 8px; }
  #composer input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #ccc; font-size: 14px; }
  #composer button { padding: 10px 20px; border-radius: 20px; border: none; background: #25D366; color: white; font-weight: 600; cursor: pointer; }
  #empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; }

  /* Talepler gorunumu */
  #leadsView { flex: 1; overflow-y: auto; padding: 20px; }
  #leadsFilters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  #leadsFilters button { padding: 8px 14px; border-radius: 16px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 13px; }
  #leadsFilters button.active { background: #075E54; color: #fff; border-color: #075E54; }
  .leadCard { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .leadCard .leadTop { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .leadCard h4 { margin: 0 0 4px 0; font-size: 15px; }
  .leadCard .meta { font-size: 13px; color: #666; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge.Bekliyor { background: #fff3cd; color: #856404; }
  .badge.Takipte { background: #d1ecf1; color: #0c5460; }
  .badge.OlumluKapandi { background: #d4edda; color: #155724; }
  .badge.OlumsuzKapandi { background: #f8d7da; color: #721c24; }
  .leadCard .ozet { font-size: 12px; color: #555; background: #f7f7f7; padding: 8px 10px; border-radius: 6px; margin-top: 10px; white-space: pre-wrap; word-break: break-word; }
  .leadCard .notlar { margin-top: 8px; font-size: 12px; color: #555; }
  .leadCard .notlar div { padding: 4px 0; border-top: 1px dashed #eee; }
  .leadCard .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .leadCard select, .leadCard input[type=text], .leadCard input[type=datetime-local] { padding: 6px 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; }
  .leadCard button.smallBtn { padding: 6px 10px; border-radius: 6px; border: none; background: #075E54; color: #fff; font-size: 12px; cursor: pointer; }
  .leadCard .hatirlatmaBilgi { font-size: 12px; color: #0c5460; margin-top: 6px; }

  /* Istatistikler gorunumu */
  #statsView { flex: 1; overflow-y: auto; padding: 20px; }
  .statsGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .statCard { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); text-align: center; }
  .statCard .num { font-size: 28px; font-weight: 700; color: #075E54; }
  .statCard .label { font-size: 12px; color: #666; margin-top: 4px; }
  .statSection { background: #fff; border-radius: 10px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .statSection h3 { margin: 0 0 12px 0; font-size: 14px; color: #333; }
  .barRow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .barRow .barLabel { width: 160px; flex-shrink: 0; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .barRow .barTrack { flex: 1; background: #eee; border-radius: 6px; height: 14px; overflow: hidden; }
  .barRow .barFill { background: #25D366; height: 100%; }
  .barRow .barCount { width: 28px; text-align: right; color: #666; }

  /* Dokumanlar gorunumu */
  #docsView { flex: 1; overflow-y: auto; padding: 20px; }
  .docRow { background: #fff; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .docRow .docUrun { font-weight: 600; font-size: 14px; }
  .docRow .docDurum { font-size: 12px; color: #666; margin-top: 2px; }
  .docRow .docActions { display: flex; gap: 8px; align-items: center; }
  .docRow input[type=file] { font-size: 12px; }
  .docRow button.smallBtn { padding: 6px 10px; border-radius: 6px; border: none; background: #16324F; color: #fff; font-size: 12px; cursor: pointer; }
  .docRow button.silBtn { background: #7A1F35; }
</style>
</head>
<body>

<div id="topTabs">
  <button id="tabKonusmalar" class="active">💬 Konuşmalar</button>
  <button id="tabTalepler">📋 Talepler</button>
  <button id="tabIstatistik">📊 İstatistikler</button>
  <button id="tabDokumanlar">📄 Dokümanlar</button>
</div>

<div id="appBody">
<div id="sidebar">
  <h2>Konusmalar</h2>
  <div id="convoList"></div>
</div>

<div id="main">
  <div id="empty">Soldan bir konusma secin</div>
</div>

<div id="leadsView" style="display:none;"></div>
<div id="statsView" style="display:none;"></div>
<div id="docsView" style="display:none;"></div>
</div>

<script>
let activePhone = null;
let pollTimer = null;

async function fetchConversations() {
  const res = await fetch('/api/panel/conversations');
  return res.json();
}

async function fetchMessages(phone) {
  const res = await fetch('/api/panel/conversations/' + encodeURIComponent(phone));
  return res.json();
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString('tr-TR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

async function renderSidebar() {
  const convos = await fetchConversations();
  const list = document.getElementById('convoList');
  list.innerHTML = '';
  convos.forEach(c => {
    const div = document.createElement('div');
    div.className = 'convo' + (c.phone === activePhone ? ' active' : '');
    div.onclick = () => selectConversation(c.phone);
    div.innerHTML = `
      <div class="name">${c.name || c.phone}</div>
      <div class="phone">${c.phone}</div>
      <div class="preview">${c.lastDirection === 'out' ? 'Siz: ' : ''}${escapeHtml(c.lastMessage || '')}</div>
    `;
    list.appendChild(div);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function selectConversation(phone) {
  activePhone = phone;
  renderSidebar();
  const data = await fetchMessages(phone);
  renderMain(phone, data);
}

function renderMain(phone, data) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div id="chatHeader">
      <h3>${data.name || phone} <span style="color:#999; font-weight:400;">(${phone})</span></h3>
      <button id="pauseBtn" class="${data.paused ? 'paused' : 'active'}">${data.paused ? 'Bot Duraklatildi - Devam Ettir' : 'Bot Aktif - Duraklat'}</button>
    </div>
    <div id="messages"></div>
    <div id="composer">
      <input type="file" id="fileInput" accept="application/pdf" style="display:none" />
      <button id="attachBtn" title="PDF ekle (poliçe/teklif dosyası)" style="background:#e0e0e0; color:#333;">📎</button>
      <input type="text" id="msgInput" placeholder="Mesajinizi yazin..." />
      <button id="sendBtn">Gonder</button>
    </div>
  `;
  const messagesDiv = document.getElementById('messages');
  data.messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.direction;
    div.innerHTML = `${escapeHtml(m.text)}<div class="time">${formatTime(m.timestamp)}</div>`;
    messagesDiv.appendChild(div);
  });
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  document.getElementById('pauseBtn').onclick = async () => {
    await fetch('/api/panel/toggle-pause', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: phone, paused: !data.paused })
    });
    selectConversation(phone);
  };

  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('msgInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  document.getElementById('attachBtn').onclick = () => {
    document.getElementById('fileInput').click();
  };

  document.getElementById('fileInput').onchange = async (e) => {
    const dosya = e.target.files[0];
    if (!dosya) return;

    const aciklama = window.prompt('Dosyayla birlikte kısa bir açıklama eklemek ister misiniz? (isteğe bağlı, boş bırakabilirsiniz)') || '';

    const attachBtn = document.getElementById('attachBtn');
    attachBtn.disabled = true;
    attachBtn.textContent = '⏳';

    const formData = new FormData();
    formData.append('to', phone);
    formData.append('caption', aciklama);
    formData.append('dosya', dosya);

    try {
      const res = await fetch('/api/panel/send-document', { method: 'POST', body: formData });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert('Dosya gönderilemedi: ' + (data.error || res.statusText));
      }
    } catch (err) {
      alert('Dosya gönderilemedi: ' + err.message);
    }

    e.target.value = '';
    selectConversation(phone);
  };

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await fetch('/api/panel/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: phone, message: text })
    });
    selectConversation(phone);
  }
}

async function poll() {
  if (currentTab === 'konusmalar') {
    await renderSidebar();
    if (activePhone) {
      const data = await fetchMessages(activePhone);
      renderMain(activePhone, data);
    }
  } else if (currentTab === 'talepler') {
    await renderLeadsView();
  } else if (currentTab === 'istatistik') {
    await renderStatsView();
  } else if (currentTab === 'dokumanlar') {
    await renderDocsView();
  }
}

// --- Sekmeler ---
let currentTab = 'konusmalar';

function sekmeGoster(sekme) {
  currentTab = sekme;
  document.getElementById('tabKonusmalar').classList.toggle('active', sekme === 'konusmalar');
  document.getElementById('tabTalepler').classList.toggle('active', sekme === 'talepler');
  document.getElementById('tabIstatistik').classList.toggle('active', sekme === 'istatistik');
  document.getElementById('tabDokumanlar').classList.toggle('active', sekme === 'dokumanlar');

  const konusmaGorunumu = sekme === 'konusmalar';
  document.getElementById('appBody').style.display = 'flex';
  document.getElementById('sidebar').style.display = konusmaGorunumu ? 'block' : 'none';
  document.getElementById('main').style.display = konusmaGorunumu ? 'flex' : 'none';
  document.getElementById('leadsView').style.display = sekme === 'talepler' ? 'block' : 'none';
  document.getElementById('statsView').style.display = sekme === 'istatistik' ? 'block' : 'none';
  document.getElementById('docsView').style.display = sekme === 'dokumanlar' ? 'block' : 'none';
  poll();
}

document.getElementById('tabKonusmalar').onclick = () => sekmeGoster('konusmalar');
document.getElementById('tabTalepler').onclick = () => sekmeGoster('talepler');
document.getElementById('tabIstatistik').onclick = () => sekmeGoster('istatistik');
document.getElementById('tabDokumanlar').onclick = () => sekmeGoster('dokumanlar');

// --- Dokumanlar gorunumu ---
async function fetchDocs() {
  const res = await fetch('/api/panel/dokumanlar');
  return res.json();
}

async function renderDocsView() {
  const { urunler } = await fetchDocs();
  const view = document.getElementById('docsView');

  view.innerHTML =
    '<h2 style="margin-top:0;">Ürün Formları / Dokümanları</h2>' +
    '<p style="color:#666; font-size:13px; margin-bottom:16px;">Buradan yüklediğiniz PDF/doküman, danışmanlar WhatsApp\'tan "Form İste" dediğinde ilgili ürün için otomatik gönderilir.</p>' +
    urunler.map(u => `
      <div class="docRow" data-urun="${escapeHtml(u.urunKey)}">
        <div>
          <div class="docUrun">${escapeHtml(u.urunAdi)}</div>
          <div class="docDurum">${u.yuklu ? '✅ Yüklü: ' + escapeHtml(u.dosyaAdi) : '— Henüz doküman yüklenmemiş'}</div>
        </div>
        <div class="docActions">
          <input type="file" class="docDosya" accept="application/pdf" />
          <button class="smallBtn yukleBtn">Yükle</button>
          ${u.yuklu ? '<button class="smallBtn silBtn">Sil</button>' : ''}
        </div>
      </div>
    `).join('');

  view.querySelectorAll('.docRow').forEach(row => {
    const urunKey = row.dataset.urun;

    row.querySelector('.yukleBtn').onclick = async () => {
      const dosyaInput = row.querySelector('.docDosya');
      if (!dosyaInput.files[0]) { alert('Lütfen bir PDF dosyası seçin.'); return; }
      const formData = new FormData();
      formData.append('dosya', dosyaInput.files[0]);
      await fetch('/api/panel/dokumanlar/' + encodeURIComponent(urunKey), { method: 'POST', body: formData });
      renderDocsView();
    };

    const silBtn = row.querySelector('.silBtn');
    if (silBtn) {
      silBtn.onclick = async () => {
        if (!confirm('Bu dokümanı silmek istediğinizden emin misiniz?')) return;
        await fetch('/api/panel/dokumanlar/' + encodeURIComponent(urunKey), { method: 'DELETE' });
        renderDocsView();
      };
    }
  });
}

// --- Istatistikler gorunumu ---
async function fetchStats() {
  const res = await fetch('/api/panel/stats');
  return res.json();
}

function siraliBarlar(nesne) {
  const girdiler = Object.entries(nesne).sort((a, b) => b[1] - a[1]);
  const maks = girdiler.length ? girdiler[0][1] : 1;
  return girdiler
    .map(
      ([etiket, sayi]) => `
      <div class="barRow">
        <div class="barLabel">${escapeHtml(etiket)}</div>
        <div class="barTrack"><div class="barFill" style="width:${Math.round((sayi / maks) * 100)}%"></div></div>
        <div class="barCount">${sayi}</div>
      </div>`
    )
    .join('') || '<div style="color:#999;">Henüz veri yok.</div>';
}

async function renderStatsView() {
  const s = await fetchStats();
  const view = document.getElementById('statsView');

  view.innerHTML = `
    <h2 style="margin-top:0;">İstatistikler</h2>
    <div class="statsGrid">
      <div class="statCard"><div class="num">${s.toplamTalep}</div><div class="label">Toplam Talep</div></div>
      <div class="statCard"><div class="num">${s.son7Gun}</div><div class="label">Son 7 Gün</div></div>
      <div class="statCard"><div class="num">${s.son30Gun}</div><div class="label">Son 30 Gün</div></div>
      <div class="statCard"><div class="num">${s.buCeyrek}</div><div class="label">Bu Çeyrek (Ç${s.ceyrekNo})</div></div>
      <div class="statCard"><div class="num">${s.yilBasindanBugune}</div><div class="label">Yıl Başından Bugüne</div></div>
      <div class="statCard"><div class="num">${s.donusumOrani === null ? '—' : s.donusumOrani + '%'}</div><div class="label">Olumlu Dönüşüm Oranı</div></div>
    </div>
    <div class="statSection">
      <h3>Durum Dağılımı</h3>
      ${siraliBarlar(s.durumBazinda)}
    </div>
    <div class="statSection">
      <h3>Ürün Bazında Talepler</h3>
      ${siraliBarlar(s.urunBazinda)}
    </div>
    <div class="statSection">
      <h3>Danışman Bazında Talepler</h3>
      ${siraliBarlar(s.danismanBazinda)}
    </div>
  `;
}

// --- Talepler (leads) gorunumu ---
let leadsFiltre = 'Hepsi';

async function fetchLeads() {
  const res = await fetch('/api/panel/leads');
  return res.json();
}

function formatTarih(ts) {
  return new Date(ts).toLocaleString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function badgeClass(durum) {
  const harita = {
    'Bekliyor': 'badge Bekliyor',
    'Takipte': 'badge Takipte',
    'Olumlu Kapandı': 'badge OlumluKapandi',
    'Olumsuz Kapandı': 'badge OlumsuzKapandi'
  };
  return harita[durum] || 'badge';
}

async function renderLeadsView() {
  const { leads, durumlar } = await fetchLeads();
  const view = document.getElementById('leadsView');

  const filtreliLeads = leadsFiltre === 'Hepsi' ? leads : leads.filter(l => l.durum === leadsFiltre);

  const filtreBar = ['Hepsi', ...durumlar].map(d =>
    `<button class="${d === leadsFiltre ? 'active' : ''}" data-durum="${escapeHtml(d)}">${escapeHtml(d)} ${d !== 'Hepsi' ? '(' + leads.filter(l => l.durum === d).length + ')' : '(' + leads.length + ')'}</button>`
  ).join('');

  const kartlar = filtreliLeads.map(lead => {
    const notlarHtml = lead.notlar.map(n => `<div>${escapeHtml(n.metin)} <span style="color:#999;">(${formatTarih(n.tarih)})</span></div>`).join('');
    const belgelerHtml = (lead.belgeler || []).length
      ? '<div class="notlar">📎 Belgeler:<br/>' + lead.belgeler.map((b, i) =>
          `<a href="data:${b.mimeType};base64,${b.veriBase64}" download="${escapeHtml(b.dosyaAdi)}" style="color:#1668A1;">${escapeHtml(b.dosyaAdi)}</a> <span style="color:#999;">(${formatTarih(b.yuklenmeZamani)})</span>`
        ).join('<br/>') + '</div>'
      : '';
    const hatirlatmaHtml = lead.hatirlatma
      ? `<div class="hatirlatmaBilgi">⏰ Hatırlatma kuruldu: ${formatTarih(lead.hatirlatma.zaman)}${lead.hatirlatma.not ? ' - ' + escapeHtml(lead.hatirlatma.not) : ''} ${lead.hatirlatma.gonderildi ? '(gönderildi)' : '(bekliyor)'}</div>`
      : '';
    const durumSecenekleri = durumlar.map(d => `<option value="${escapeHtml(d)}" ${d === lead.durum ? 'selected' : ''}>${escapeHtml(d)}</option>`).join('');

    return `
      <div class="leadCard" data-id="${lead.id}">
        <div class="leadTop">
          <div>
            <h4>${escapeHtml(lead.musteriAdi || lead.telefon)} — ${escapeHtml(lead.urun)}</h4>
            <div class="meta">📞 ${escapeHtml(lead.telefon)} &nbsp;|&nbsp; 👤 ${escapeHtml(lead.danismanAdi || 'Belirsiz')} &nbsp;|&nbsp; 🕐 ${formatTarih(lead.olusturulmaZamani)}</div>
          </div>
          <span class="${badgeClass(lead.durum)}">${escapeHtml(lead.durum)}</span>
        </div>
        <div class="ozet">${escapeHtml(lead.ozet || '')}</div>
        <div class="notlar">${notlarHtml}</div>
        ${belgelerHtml}
        ${hatirlatmaHtml}
        <div class="actions">
          <select class="durumSelect">${durumSecenekleri}</select>
          <button class="smallBtn durumKaydetBtn">Durumu Kaydet</button>
        </div>
        <div class="actions">
          <input type="text" class="notInput" placeholder="Not ekle (örn. görüştüm, ilgileniyor)..." style="flex:1; min-width:180px;" />
          <button class="smallBtn notEkleBtn">Not Ekle</button>
        </div>
        <div class="actions">
          <input type="datetime-local" class="hatirlatmaZaman" />
          <input type="text" class="hatirlatmaNot" placeholder="Hatırlatma notu (örn. çarşamba sabahı ara)" style="flex:1; min-width:160px;" />
          <button class="smallBtn hatirlatmaKurBtn">Hatırlatma Kur</button>
        </div>
      </div>
    `;
  }).join('') || '<div style="color:#999; padding:20px;">Bu durumda talep yok.</div>';

  view.innerHTML = `
    <h2 style="margin-top:0;">Talepler</h2>
    <div id="leadsFilters">${filtreBar}</div>
    ${kartlar}
  `;

  view.querySelectorAll('#leadsFilters button').forEach(btn => {
    btn.onclick = () => {
      leadsFiltre = btn.dataset.durum;
      renderLeadsView();
    };
  });

  view.querySelectorAll('.leadCard').forEach(card => {
    const id = card.dataset.id;

    card.querySelector('.durumKaydetBtn').onclick = async () => {
      const durum = card.querySelector('.durumSelect').value;
      await fetch('/api/panel/leads/' + encodeURIComponent(id) + '/durum', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ durum })
      });
      renderLeadsView();
    };

    card.querySelector('.notEkleBtn').onclick = async () => {
      const input = card.querySelector('.notInput');
      const metin = input.value.trim();
      if (!metin) return;
      await fetch('/api/panel/leads/' + encodeURIComponent(id) + '/not', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ metin })
      });
      renderLeadsView();
    };

    card.querySelector('.hatirlatmaKurBtn').onclick = async () => {
      const zamanInput = card.querySelector('.hatirlatmaZaman');
      const notInput = card.querySelector('.hatirlatmaNot');
      if (!zamanInput.value) { alert('Lütfen bir hatırlatma tarihi/saati seçin.'); return; }
      await fetch('/api/panel/leads/' + encodeURIComponent(id) + '/hatirlatma', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zaman: zamanInput.value, not: notInput.value.trim() })
      });
      renderLeadsView();
    };
  });
}

renderSidebar();
pollTimer = setInterval(poll, 4000);
</script>

</body>
</html>
